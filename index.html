<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money SEC</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#f8c8dc;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:white;
border-radius:20px;
padding:25px;
width:100%;
max-width:400px;
box-shadow:0 10px 30px #0002;
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#ff6fa5;
color:white;
font-size:16px;
}

.item{
background:#f5f5f5;
padding:15px;
border-radius:15px;
margin-top:15px;
}

img{
width:100%;
margin-top:20px;
}

.hidden{
display:none;
}

</style>

</head>


<body>


<div class="card">


<div id="login">

<h1>🔐 Login</h1>

<p id="lineName">
กำลังเชื่อมต่อ LINE...
</p>


<input id="studentId"
placeholder="เลขนักศึกษา">


<button onclick="saveUser()">
เข้าสู่ระบบ
</button>


</div>



<div id="home" class="hidden">


<h1>
💰 Money SEC
</h1>


<p id="user"></p>


<div id="billList">
กำลังโหลด...
</div>


</div>




<div id="detail" class="hidden">


<h1 id="title"></h1>


<h2>
ยอด:
<span id="amount"></span>
บาท
</h2>


<img id="qr">


<button onclick="back()">
กลับ
</button>


</div>


</div>



<script>


const LIFF_ID =
"2010646520-HSdNTYeC";


const API_URL =
"https://script.google.com/macros/s/AKfycbwWDvTyjfJP9yYY-j1VoQvwH06_gkCroRnrSxMPiBzDHOdDTVE3C_uk654F8XEL1mBj/exec";



let lineUser="";



async function init(){


await liff.init({
liffId:LIFF_ID
});


if(!liff.isLoggedIn()){

liff.login();

return;

}


const profile =
await liff.getProfile();


lineUser =
profile.displayName;


document.getElementById("lineName")
.innerText =
"สวัสดี "+lineUser;



}



function saveUser(){


let id =
document.getElementById("studentId").value;



if(!id){

alert("ใส่เลขนักศึกษาก่อน");

return;

}



localStorage.setItem(
"studentId",
id
);



localStorage.setItem(
"lineName",
lineUser
);



document.getElementById("login")
.classList.add("hidden");



document.getElementById("home")
.classList.remove("hidden");



document.getElementById("user")
.innerText =
"👤 "+lineUser+
" | "+id;



loadBills();


}




async function loadBills(){


const res =
await fetch(
API_URL+"?action=getBills"
);


const data =
await res.json();


let html="";


data.bills.forEach(b=>{


html+=`

<div class="item"
onclick='openBill(${JSON.stringify(b)})'>


📅 ${b.month}

<br>

${b.title}

<br>

💵 ${b.amount} บาท


</div>

`;

});


document.getElementById("billList")
.innerHTML=html;


}




function openBill(b){


home.classList.add("hidden");

detail.classList.remove("hidden");


title.innerText=b.title;

amount.innerText=b.amount;


qr.src=
b.qr.replace(
"https://drive.google.com/file/d/",
"https://drive.google.com/uc?id="
).split("/view")[0];


}



function back(){


detail.classList.add("hidden");

home.classList.remove("hidden");


}



init();


</script>


</body>
</html>
