<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money SEC</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f8c8dc;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    width:100%;
    max-width:400px;
    box-shadow:0 10px 30px #0002;
}

h1{
    text-align:center;
}

.item{
    background:#f5f5f5;
    padding:15px;
    border-radius:15px;
    margin-top:15px;
    cursor:pointer;
}

.item:hover{
    background:#ffe4ef;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff6fa5;
    color:white;
    font-size:16px;
    margin-top:15px;
}

img{
    width:100%;
    margin-top:20px;
}

.hidden{
    display:none;
}

</style>

</head>


<body>


<div class="card">


<div id="home">

<h1>💰 Money SEC</h1>

<p>รายการเก็บเงิน</p>

<div id="billList">
กำลังโหลด...
</div>

</div>



<div id="detail" class="hidden">

<h1 id="title"></h1>

<h2>
ยอดเงิน:
<span id="amount"></span> บาท
</h2>


<img id="qr">


<button onclick="back()">
กลับ
</button>


</div>


</div>




<script>


// ใส่ URL GAS ของแกตรงนี้
const API_URL =
"https://script.google.com/macros/s/AKfycbwWDvTyjfJP9yYY-j1VoQvwH06_gkCroRnrSxMPiBzDHOdDTVE3C_uk654F8XEL1mBj/exec";




async function loadBills(){


    const res =
    await fetch(
        API_URL+"?action=getBills"
    );


    const data =
    await res.json();



    let html="";


    data.bills.forEach(b=>{


        html += `

        <div class="item"
        onclick='openBill(${JSON.stringify(b)})'>


        📅 ${b.month}

        <br>

        ${b.title}

        <br>

        💵 ${b.amount} บาท


        </div>

        `;


    });



    document.getElementById("billList")
    .innerHTML = html;


}




function openBill(b){


    document.getElementById("home")
    .classList.add("hidden");


    document.getElementById("detail")
    .classList.remove("hidden");



    document.getElementById("title")
    .innerText=b.title;


    document.getElementById("amount")
    .innerText=b.amount;


    document.getElementById("qr")
    .src=b.qr.replace(
        "https://drive.google.com/file/d/",
        "https://drive.google.com/uc?id="
    ).split("/view")[0];


}



function back(){

    document.getElementById("detail")
    .classList.add("hidden");


    document.getElementById("home")
    .classList.remove("hidden");

}




loadBills();


</script>


</body>
</html>
