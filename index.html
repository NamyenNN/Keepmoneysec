<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money SEC</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="card">

<!-- LOGIN -->
<div id="login">

<h1>🔐 Login</h1>

<p id="lineName">
กำลังเชื่อมต่อ LINE...
</p>

<input
id="studentId"
placeholder="เลขนักศึกษา">

<button onclick="saveUser()">
เข้าสู่ระบบ
</button>

</div>



<!-- HOME -->
<div id="home" class="hidden">

<h1>💰 Money SEC</h1>

<p id="user"></p>

<div id="billList">
กำลังโหลด...
</div>

</div>



<!-- DETAIL -->
<div id="detail" class="hidden">

<h1 id="title"></h1>

<h2>

ยอด :
<span id="amount"></span>
บาท

</h2>

<p id="billStatus"></p>

<img
id="qr"
alt="QR PromptPay">

<hr>

<h3>📸 แนบสลิปการโอน</h3>

<input
type="file"
id="slip"
accept="image/*"
onchange="previewSlip(event)">

<img
id="preview"
class="hidden"
alt="Preview Slip">

<button
id="uploadBtn"
onclick="uploadSlip()">

ส่งสลิป

</button>

<br><br>

<button
onclick="back()">

← กลับ

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
