<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbyVaPxetXKM2zCrTZLhjXK7nD1vnxsYZFfJn2FtIVEQwA9T1d7ud3qEWbi9N_LS2O4Y/exec';


async function checkLogin() {

    let stdId = document.getElementById('studentId').value;
    let loginStatus = document.getElementById('loginStatus');

    if(!stdId) {
        loginStatus.innerText = 'อย่าลืมกรอกรหัสนะแก!';
        return;
    }

    loginStatus.innerText = 'กำลังตรวจรหัสแป๊บนึง... ⏳';


    try {

        let response = await fetch(scriptURL, {
            method: 'POST',
            redirect: 'follow',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8'
            },
            body: JSON.stringify({
                action: 'login',
                studentId: stdId
            })
        });


        let data = await response.json();


        if(data.success) {

            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';


            document.getElementById('userInfoDisplay').innerText =
            `สวัสดีแก! คุณ: ${data.user.name} (เลขที่ ${data.user.assignedNo})`;


            fetchBalance();


        } else {

            loginStatus.innerText = 'ไม่มีรหัสนี้ในระบบอ่าแก ❌';

        }


    } catch(error) {

        console.log(error);
        loginStatus.innerText = 'ระบบเชื่อมต่อขัดข้อง ลองอีกทีนะ 😢';

    }

}



async function fetchBalance() {

    try {

        let response = await fetch(scriptURL);

        let data = await response.json();

        document.getElementById('balanceDisplay').innerText =
        data.balance + ' ฿';


    } catch(error) {

        console.log(error);
        document.getElementById('balanceDisplay').innerText = 'Error';

    }

}



async function updateMoney(action) {

    let amount = document.getElementById('amount').value;
    let statusText = document.getElementById('statusText');


    if(!amount || amount <= 0) {

        statusText.innerText = 'กรอกจำนวนเงินก่อนสิแก!';
        return;

    }


    statusText.innerText = 'กำลังส่งข้อมูลเข้า Google Sheets... ⏳';


    let finalAmount = action === 'add'
        ? Number(amount)
        : -Number(amount);



    try {


        let response = await fetch(scriptURL, {

            method:'POST',

            redirect:'follow',

            headers:{
                'Content-Type':'text/plain;charset=utf-8'
            },


            body:JSON.stringify({

                action:'update',

                amount:finalAmount

            })

        });



        let data = await response.json();



        if(data.success) {


            document.getElementById('balanceDisplay').innerText =
            data.newBalance + ' ฿';


            statusText.innerText =
            'อัปเดตยอดเงินเรียบร้อยแล้ว! 🎉';


            document.getElementById('amount').value = '';

        }


    } catch(error) {


        console.log(error);

        statusText.innerText =
        'เกิดข้อผิดพลาดในการอัปเดตยอด 😢';


    }

}

</script>
